<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋접근성팀 공지사항 정리</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 🔌 Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .skip-link:focus {
            transform: translateY(0%);
        }
        dialog::backdrop {
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- 1. 키보드 사용자용 스킵 링크 -->
    <a href="#main-content" class="skip-link absolute top-0 left-0 bg-indigo-600 text-white px-4 py-2 rounded-b-lg z-[100] transform -translate-y-full transition-transform focus:translate-y-0 focus:outline-none focus:ring-2 focus:ring-white">
        본문 바로가기
    </a>

    <!-- Header Section -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span aria-hidden="true" class="text-2xl">📋</span>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">Dev Meeting Notes</h1>
                    <p class="text-xs text-slate-300">공지사항 보드</p>
                </div>
            </div>
            <!-- 실시간 상태 표시등 -->
            <div class="flex items-center gap-2 text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-200">
                <span id="db-status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="db-status-text">데이터가 클라우드에 연결되어 관리되고 있습니다.</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main id="main-content" class="max-w-4xl mx-auto px-4 py-8" tabindex="-1">
        
        <!-- Search & Filter Controls -->
        <section class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 mb-6 backdrop-blur-sm" aria-label="검색 및 카테고리 필터">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                
                <!-- Search Input & Add Button -->
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto items-stretch sm:items-center">
                    <div class="relative w-full sm:w-72">
                        <label id="search-label" for="search-input" class="sr-only">공지사항 검색</label>
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400" aria-hidden="true">🔍</span>
                        <input 
                            type="search" 
                            id="search-input"
                            aria-labelledby="search-label"
                            placeholder="제목, 내용, 태그 검색..." 
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-sm text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        />
                    </div>
                    <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400" aria-haspopup="dialog" aria-controls="add-modal">
                        <span aria-hidden="true">➕</span> 공지 추가
                    </button>
                </div>

                <!-- Category Tabs (WAI-ARIA) -->
                <div role="tablist" aria-label="공지사항 카테고리 필터" class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button role="tab" aria-selected="true" aria-controls="announcement-list" id="tab-all" onclick="filterCategory('all')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white focus:outline-none transition-all" tabindex="0">전체보기</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-qa" onclick="filterCategory('qa')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 transition-all" tabindex="-1"><span aria-hidden="true">🐛</span> QA</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-monitoring" onclick="filterCategory('monitoring')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 transition-all" tabindex="-1"><span aria-hidden="true">📊</span> 모니터링</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-general" onclick="filterCategory('general')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 transition-all" tabindex="-1"><span aria-hidden="true">📢</span> 기타공지</button>
                </div>
            </div>
        </section>

        <!-- 🏷️ 선택된 태그 필터 상태 표시 영역 (a11y 준수) -->
        <div id="active-tag-container" class="hidden items-center gap-2 mb-6 bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-xl text-xs text-indigo-300 w-fit">
            <span id="active-tag-text"></span>
            <button onclick="clearTagFilter()" class="font-bold hover:text-white ml-1 p-1 rounded hover:bg-indigo-500/20" aria-label="태그 필터 해제">✕</button>
        </div>

        <!-- Dynamic Screen Reader Announcements -->
        <div id="sr-announcement" class="sr-only" aria-live="polite" aria-atomic="true"></div>

        <!-- Announcement List -->
        <section id="announcement-section" aria-labelledby="section-title">
            <h2 id="section-title" class="sr-only">공지사항 목록</h2>
            <div id="announcement-list" role="tabpanel" aria-labelledby="tab-all" class="space-y-4">
                <!-- DB 데이터 로드 공간 -->
            </div>
        </section>

    </main>

    <!-- ♿ 새 공지 등록 모달창 (카테고리: QA, 모니터링, 기타공지) -->
    <dialog id="add-modal" class="bg-slate-900 border border-slate-800 text-slate-100 rounded-2xl p-6 max-w-lg w-full focus:outline-none" aria-labelledby="modal-title">
        <div class="flex justify-between items-center mb-6">
            <h2 id="modal-title" class="text-lg font-bold text-white flex items-center gap-2">
                <span aria-hidden="true">📝</span> 신규 업무 공지 추가
            </h2>
            <button onclick="closeAddModal()" class="text-slate-400 hover:text-white text-sm p-1.5 rounded-lg hover:bg-slate-800" aria-label="공지사항 작성 창 닫기">
                ✕
            </button>
        </div>
        
        <form id="add-form" class="space-y-4" onsubmit="handleFormSubmit(event)">
            <div>
                <label for="form-category" class="block text-xs font-semibold text-slate-300 mb-1.5">카테고리 분류 *</label>
                <select id="form-category" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="qa">🐛 QA</option>
                    <option value="monitoring">📊 모니터링</option>
                    <option value="general">📢 기타공지</option>
                </select>
            </div>

            <div>
                <label for="form-title" class="block text-xs font-semibold text-slate-300 mb-1.5">공지 제목 *</label>
                <input type="text" id="form-title" required placeholder="예: QA 우선순위 변경" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label for="form-tags" class="block text-xs font-semibold text-slate-300 mb-1.5">태그 (쉼표로 구분)</label>
                <input type="text" id="form-tags" placeholder="QA, 모니터링, 지침" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label for="form-content" class="block text-xs font-semibold text-slate-300 mb-1.5">공지 상세 내용 *</label>
                <textarea id="form-content" required rows="5" placeholder="회의 도중 공유된 구체적인 실행 절차나 업무 준수 사항을 작성하세요." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>

            <div class="flex justify-end gap-2 pt-4 border-t border-slate-800">
                <button type="button" onclick="closeAddModal()" class="px-4 py-2 text-sm font-semibold bg-slate-800 hover:bg-slate-750 text-slate-300 rounded-xl transition-all">취소</button>
                <button id="submit-btn" type="submit" class="px-4 py-2 text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all">공지 등록</button>
            </div>
        </form>
    </dialog>

    <script>
        // 🔒 빌트인된 Supabase 인증 정보
        const SUPABASE_URL = "https://cqrvqcsupdgsxgtpfxtd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxcnZxY3N1cGRnc3hndHBmeHRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNzk3MjcsImV4cCI6MjA5OTY1NTcyN30.NCUfjIvijawwy3v-wSaQXyzEioo_GK50QseGVpqXIqU";

        let supabaseClient = null;
        let announcements = [];
        let currentCategory = 'all';
        let searchQuery = '';
        let selectedTag = ''; // 🏷️ 해시태그 필터링 상태 추가
        let triggerButton = null;

        window.onload = async () => {
            initSupabase();
            await loadData();
            setupKeyboardNavigation();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderList();
            });
        };

        // Supabase 초기화 및 연결
        function initSupabase() {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                updateStatus(true, "Cloud Sync Active");
            } catch (err) {
                updateStatus(false, "DB 연결 실패");
                console.error(err);
            }
        }

        function updateStatus(isSuccess, text) {
            const dot = document.getElementById("db-status-dot");
            const label = document.getElementById("db-status-text");
            label.textContent = text;
            if(isSuccess) {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-none";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-rose-500 animate-none";
            }
        }

        // DB에서 데이터 가져오기
        async function loadData() {
            if(!supabaseClient) return;
            const { data, error } = await supabaseClient
                .from('announcements')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("데이터 로드 실패:", error);
                updateStatus(false, "데이터 동기화 실패");
                return;
            }

            announcements = data;
            renderList();
        }

        // 🏷️ 특정 해시태그 클릭 시 작동하는 필터링 함수
        function filterByTag(tag) {
            selectedTag = tag;
            
            // 태그 필터 바 노출 제어
            const container = document.getElementById('active-tag-container');
            const textSpan = document.getElementById('active-tag-text');
            textSpan.textContent = `필터링된 태그: #${tag}`;
            container.classList.remove('hidden');
            container.classList.add('flex');

            renderList();
            
            // 스크린 리더용 안내 발송
            const srAnnouncement = document.getElementById('sr-announcement');
            srAnnouncement.textContent = `태그 #${tag} 필터가 활성화되었습니다.`;
        }

        // 🏷️ 해시태그 필터 해제
        function clearTagFilter() {
            selectedTag = '';
            const container = document.getElementById('active-tag-container');
            container.classList.remove('flex');
            container.classList.add('hidden');
            
            renderList();
            
            const srAnnouncement = document.getElementById('sr-announcement');
            srAnnouncement.textContent = `태그 필터가 해제되어 전체 목록이 표시됩니다.`;
        }

        // 필터링 및 리스트 화면 렌더링
        function renderList() {
            const listContainer = document.getElementById('announcement-list');
            listContainer.innerHTML = '';

            const filtered = announcements.filter(item => {
                const matchesCategory = (currentCategory === 'all' || item.category === currentCategory);
                const matchesSearch = (
                    item.title.toLowerCase().includes(searchQuery) ||
                    item.content.toLowerCase().includes(searchQuery) ||
                    (item.tags && item.tags.some(tag => tag.toLowerCase().includes(searchQuery)))
                );
                // 태그 필터 규칙 병합
                const matchesTag = !selectedTag || (item.tags && item.tags.includes(selectedTag));

                return matchesCategory && matchesSearch && matchesTag;
            });

            // ARIA Live region 정보 갱신
            const srAnnouncement = document.getElementById('sr-announcement');
            const categoryNames = { all: "전체보기", qa: "QA", monitoring: "모니터링", general: "기타공지" };
            let currentStatusMessage = `현재 ${categoryNames[currentCategory]} 카테고리`;
            if(selectedTag) currentStatusMessage += `, #${selectedTag} 태그`;
            currentStatusMessage += ` 필터링 결과 총 ${filtered.length}개의 업무 공지가 표기되어 있습니다.`;
            srAnnouncement.textContent = currentStatusMessage;

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-16 bg-slate-800/20 border border-dashed border-slate-800 rounded-2xl" role="status">
                        <span class="text-4xl" aria-hidden="true">🤔</span>
                        <p class="text-slate-300 mt-3 text-sm">일치하는 업무 공지사항이 없습니다.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                let catBadge = '';
                if(item.category === 'qa') {
                    catBadge = '<span class="bg-rose-500/10 text-rose-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-rose-500/20"><span aria-hidden="true">🐛 </span>QA</span>';
                } else if(item.category === 'monitoring') {
                    catBadge = '<span class="bg-cyan-500/10 text-cyan-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-cyan-500/20"><span aria-hidden="true">📊 </span>모니터링</span>';
                } else {
                    catBadge = '<span class="bg-amber-500/10 text-amber-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-amber-500/20"><span aria-hidden="true">📢 </span>기타공지</span>';
                }

                const formattedDate = new Date(item.created_at || item.date).toISOString().split('T')[0];

                // ♿ 태그를 키보드 탭 및 인터랙션이 가능한 버튼으로 마크업 변경
                const tagBadges = (item.tags || []).map(tag => `
                    <button onclick="filterByTag('${tag}')" class="text-xs text-indigo-300 bg-indigo-500/5 hover:bg-indigo-500/20 border border-indigo-500/10 px-2 py-0.5 rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400" aria-label="태그 ${tag} 필터링 적용">
                        #${tag}
                    </button>
                `).join(' ');

                const cardHtml = `
                    <article class="bg-slate-800/40 border border-slate-800/80 rounded-2xl p-6 hover:border-slate-700 hover:bg-slate-800/60 focus-within:ring-2 focus-within:ring-indigo-500 transition-all duration-200" aria-labelledby="post-title-${item.id}">
                        <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                            <div>${catBadge}</div>
                            <time class="text-xs text-slate-300" datetime="${formattedDate}">${formattedDate}</time>
                        </div>
                        <h3 id="post-title-${item.id}" class="text-lg font-semibold text-white mb-2">
                            <a href="#" class="hover:text-indigo-400 focus:outline-none focus:underline transition-colors">${item.title}</a>
                        </h3>
                        <p class="text-sm text-slate-300 leading-relaxed mb-4 whitespace-pre-line">${item.content}</p>
                        <div class="flex flex-wrap items-center justify-between gap-3 pt-3 border-t border-slate-800/85">
                            <div class="flex flex-wrap gap-1.5" aria-label="관련 태그">${tagBadges}</div>
                            <button onclick="deleteAnnouncement(${item.id})" class="text-xs text-rose-400 hover:text-rose-300 hover:underline px-2.5 py-1 rounded" aria-label="'${item.title}' 공지사항 삭제">삭제하기</button>
                        </div>
                    </article>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 카테고리 필터링
        function filterCategory(category) {
            currentCategory = category;
            const tabs = document.querySelectorAll('[role="tab"]');
            tabs.forEach(tab => {
                const isSelected = tab.id === `tab-${category}`;
                tab.setAttribute('aria-selected', isSelected ? 'true' : 'false');
                tab.setAttribute('tabindex', isSelected ? '0' : '-1');
                
                if (isSelected) {
                    tab.classList.remove('bg-slate-800', 'text-slate-300');
                    tab.classList.add('bg-indigo-600', 'text-white');
                    document.getElementById('announcement-list').setAttribute('aria-labelledby', tab.id);
                } else {
                    tab.classList.remove('bg-indigo-600', 'text-white');
                    tab.classList.add('bg-slate-800', 'text-slate-300');
                }
            });
            renderList();
        }

        // WAI-ARIA 탭 방향키 내비게이션
        function setupKeyboardNavigation() {
            const tabList = document.querySelector('[role="tablist"]');
            const tabs = document.querySelectorAll('[role="tab"]');
            tabList.addEventListener('keydown', (e) => {
                let currentFocus = Array.from(tabs).indexOf(document.activeElement);
                if (currentFocus === -1) return;

                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    currentFocus = (currentFocus + 1) % tabs.length;
                    tabs[currentFocus].focus();
                    tabs[currentFocus].click();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    currentFocus = (currentFocus - 1 + tabs.length) % tabs.length;
                    tabs[currentFocus].focus();
                    tabs[currentFocus].click();
                }
            });
        }

        // 모달 제어
        function openAddModal() {
            triggerButton = document.activeElement;
            const modal = document.getElementById('add-modal');
            modal.showModal();
            document.getElementById('form-category').focus();
        }

        function closeAddModal() {
            const modal = document.getElementById('add-modal');
            modal.close();
            document.getElementById('add-form').reset();
            if (triggerButton) {
                triggerButton.focus();
            }
        }

        // DB에 신규 공지사항 인서트
        async function handleFormSubmit(e) {
            e.preventDefault();
            if(!supabaseClient) {
                alert("클라우드 서버 연결 오류로 글을 등록할 수 없습니다.");
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = "등록 중...";

            const category = document.getElementById('form-category').value;
            const title = document.getElementById('form-title').value.trim();
            const content = document.getElementById('form-content').value.trim();
            const rawTags = document.getElementById('form-tags').value;
            const tags = rawTags ? rawTags.split(',').map(tag => tag.trim()).filter(tag => tag.length > 0) : [];

            const { error } = await supabaseClient
                .from('announcements')
                .insert([{ category, title, content, tags }]);

            submitBtn.disabled = false;
            submitBtn.textContent = "공지 등록";

            if (error) {
                console.error("인서트 중 에러 발생:", error);
                alert("등록하는 동안 오류가 발생했습니다.");
                return;
            }

            closeAddModal();
            await loadData();
        }

        // DB에서 공지사항 삭제
        async function deleteAnnouncement(id) {
            if(!supabaseClient) return;
            if(confirm("이 공지사항을 클라우드 데이터베이스에서 완전히 삭제하시겠습니까?")) {
                const { error } = await supabaseClient
                    .from('announcements')
                    .delete()
                    .eq('id', id);

                if (error) {
                    console.error("삭제 실패:", error);
                    alert("삭제 중 오류가 발생했습니다.");
                    return;
                }

                await loadData();
            }
        }
    </script>
</body>
</html>
