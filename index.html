<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SV Dev Portal - 공지사항 보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 스킵 네비게이션 스타일 */
        .skip-link:focus {
            transform: translateY(0%);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- 1. Skip Navigation (키보드 사용자용 스킵 링크) -->
    <a href="#main-content" class="skip-link absolute top-0 left-0 bg-indigo-600 text-white px-4 py-2 rounded-b-lg z-[100] transform -translate-y-full transition-transform focus:translate-y-0 focus:outline-none focus:ring-2 focus:ring-white">
        본문 바로가기
    </a>

    <!-- Header Section -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span aria-hidden="true" class="text-2xl">🚀</span>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">SV Dev Portal</h1>
                    <p class="text-xs text-slate-300">Engineering Sync & Announcements</p>
                </div>
            </div>
            <!-- 상태 배지 (스크린 리더 가독성 확보) -->
            <div class="flex items-center gap-2 text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-200" aria-label="현재 시스템 상태: 스프린트 버전 2.4 활성화 중">
                <span class="w-2 h-2 rounded-full bg-emerald-500" aria-hidden="true"></span>
                <span>Sprint v2.4 Active</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 py-8" tabindex="-1">
        
        <!-- Search & Filter Controls -->
        <section class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 mb-8 backdrop-blur-sm" aria-label="검색 및 필터">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                
                <!-- Real-time Search Input -->
                <div class="relative w-full md:w-96">
                    <!-- 명시적인 Label 추가 (화면에서는 숨기고 스크린 리더에만 읽힘) -->
                    <label id="search-label" for="search-input" class="sr-only">공지사항 제목, 내용, 태그 검색</label>
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400" aria-hidden="true">🔍</span>
                    <input 
                        type="search" 
                        id="search-input"
                        aria-labelledby="search-label"
                        placeholder="제목, 내용, 태그 검색..." 
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-700 rounded-xl text-sm text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    />
                </div>

                <!-- Category Tabs (WAI-ARIA Tab Pattern) -->
                <div role="tablist" aria-label="공지사항 카테고리 필터" class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button role="tab" aria-selected="true" aria-controls="announcement-list" id="tab-all" onclick="filterCategory('all')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 transition-all" tabindex="0">전체보기</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-qa" onclick="filterCategory('qa')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 hover:text-slate-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 transition-all" tabindex="-1"><span aria-hidden="true">🐛</span> QA</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-monitoring" onclick="filterCategory('monitoring')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 hover:text-slate-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 transition-all" tabindex="-1"><span aria-hidden="true">📊</span> 모니터링</button>
                    <button role="tab" aria-selected="false" aria-controls="announcement-list" id="tab-general" onclick="filterCategory('general')" class="tab-btn px-4 py-2 text-xs font-semibold rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-750 hover:text-slate-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 transition-all" tabindex="-1"><span aria-hidden="true">📢</span> 기타 공지</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Screen Reader Announcements (스크린 리더 실시간 결과 피드백 전용) -->
        <div id="sr-announcement" class="sr-only" aria-live="polite" aria-atomic="true"></div>

        <!-- Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left: Announcement List (Role: Tabpanel) -->
            <section class="lg:col-span-2 space-y-4" id="announcement-section" aria-labelledby="section-title">
                <h2 id="section-title" class="sr-only">공지사항 목록</h2>
                <div id="announcement-list" role="tabpanel" aria-labelledby="tab-all" class="space-y-4">
                    <!-- Dynamically populated via JS -->
                </div>
            </section>

            <!-- Right: Quick Status & Metrics -->
            <aside class="space-y-6" aria-label="부가 정보 및 시스템 현황">
                <!-- Status Card -->
                <div class="bg-slate-800/30 border border-slate-800 rounded-2xl p-6">
                    <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4">📢 시스템 상태 요약</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between items-center py-2 border-b border-slate-850">
                            <span class="text-slate-300">스테이징 빌드</span>
                            <span class="px-2 py-0.5 rounded text-xs bg-emerald-500/10 text-emerald-400 font-semibold border border-emerald-500/20">Passing</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-slate-850">
                            <span class="text-slate-300">Datadog 연동</span>
                            <span class="px-2 py-0.5 rounded text-xs bg-emerald-500/10 text-emerald-400 font-semibold border border-emerald-500/20">Connected</span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-slate-300">Code Freeze D-Day</span>
                            <span class="px-2 py-0.5 rounded text-xs bg-amber-500/10 text-amber-400 font-semibold border border-amber-500/20">D-6 (7월 21일)</span>
                        </div>
                    </div>
                </div>

                <!-- On-Call Card -->
                <div class="bg-slate-800/30 border border-slate-800 rounded-2xl p-6">
                    <h2 class="text-sm font-bold text-slate-300 uppercase tracking-wider mb-3">📞 이번 주 온콜 엔지니어</h2>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-white text-sm" aria-hidden="true">
                            JD
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-200">John Doe (Infra Team)</p>
                            <p class="text-xs text-slate-300">Slack: <span aria-label="골뱅이 john 언더바 infra">@john_infra</span></p>
                        </div>
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <!-- JS Core Logic -->
    <script>
        const announcements = [
            {
                id: 1,
                category: "qa",
                priority: "High",
                title: "v2.4 릴리스 후보(RC) 전체 Regression Test 진행",
                content: "결제 모듈 개편에 따른 스테이징 환경 전체 QA가 시작되었습니다. Edge case에서 트랜잭션 실패 시 롤백 로직이 정상 동작하는지 집중 검증해 주세요. 크리티컬 버그 발견 시 Jira [PROD-4021] 티켓 하위에 서브 태스크로 생성 부탁드립니다.",
                tags: ["QA", "v2.4", "Payment", "Staging"],
                date: "2026-07-15",
                author: "Sarah (QA Lead)"
            },
            {
                id: 2,
                category: "monitoring",
                priority: "Medium",
                title: "Datadog Alert 임계치 최적화 작업 예정",
                content: "기존에 Kubernetes Pod CPU 사용량이 일시적으로 80%를 칠 때마다 슬랙 알람이 울려 피로도가 높았습니다. 이를 방지하고자 '85% 이상 상태가 5분 이상 지속될 때'만 온콜로 넘어가도록 임계치를 상향 조정했습니다.",
                tags: ["Datadog", "K8s", "On-call", "Infra"],
                date: "2026-07-14",
                author: "Alex (Infra Dev)"
            },
            {
                id: 3,
                category: "general",
                priority: "High",
                title: "다음 주 화요일(7/21) 18:00 Code Freeze 및 배포 준비",
                content: "v2.4 정식 프로덕션 배포를 위해 다음 주 화요일 18:00부로 Code Freeze가 들어갑니다. 긴급 핫픽스를 제외한 모든 PR은 사전에 머지하거나 배포 이후로 일정을 조율해 주시기 바랍니다.",
                tags: ["Deployment", "Code-Freeze", "Schedule"],
                date: "2026-07-15",
                author: "Chris (Engineering Manager)"
            },
            {
                id: 4,
                category: "qa",
                priority: "Low",
                title: "신규 개발 피처 테스트 커버리지 가이드라인 업데이트",
                content: "앞으로 작성되는 모든 신규 비즈니스 로직은 유닛 테스트 커버리지 최소 80% 이상을 만족해야 빌드가 통과되도록 CI/CD 파이프라인 설정을 수정할 예정입니다. 변경 가이드를 미리 체크해 주세요.",
                tags: ["QA", "CI/CD", "Test-Coverage"],
                date: "2026-07-12",
                author: "Sarah (QA Lead)"
            },
            {
                id: 5,
                category: "monitoring",
                priority: "Medium",
                title: "마이크로서비스 APM Latency Matrix 대시보드 신설",
                content: "서비스 간 동기/비동기 호출 병목 지점을 시각화해 주는 신규 APM 대시보드가 Datadog에 구축되었습니다. 트러블슈팅 발생 시 디버깅용으로 적극 활용 바랍니다. (대시보드 링크는 사내 위키 참고)",
                tags: ["Datadog", "APM", "Microservices"],
                date: "2026-07-11",
                author: "Alex (Infra Dev)"
            }
        ];

        let currentCategory = 'all';
        let searchQuery = '';

        window.onload = () => {
            renderList();
            setupKeyboardNavigation();
            
            // 실시간 검색 검색어 입력 이벤트 (디바운싱 생략, 즉각 반응)
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderList();
            });
        };

        // 카테고리 필터 변경 (WAI-ARIA 상태 관리 포함)
        function filterCategory(category) {
            currentCategory = category;
            
            const tabs = document.querySelectorAll('[role="tab"]');
            tabs.forEach(tab => {
                const isSelected = tab.id === `tab-${category}`;
                tab.setAttribute('aria-selected', isSelected ? 'true' : 'false');
                tab.setAttribute('tabindex', isSelected ? '0' : '-1');
                
                if (isSelected) {
                    tab.classList.remove('bg-slate-800', 'text-slate-300');
                    tab.classList.add('bg-indigo-600', 'text-white');
                    document.getElementById('announcement-list').setAttribute('aria-labelledby', tab.id);
                } else {
                    tab.classList.remove('bg-indigo-600', 'text-white');
                    tab.classList.add('bg-slate-800', 'text-slate-300');
                }
            });

            renderList();
        }

        // 키보드 방향키로 탭 탐색 가능하도록 구현 (WAI-ARIA Tab list 키보드 내비게이션 표준 준수)
        function setupKeyboardNavigation() {
            const tabList = document.querySelector('[role="tablist"]');
            const tabs = document.querySelectorAll('[role="tab"]');

            tabList.addEventListener('keydown', (e) => {
                let currentFocus = Array.from(tabs).indexOf(document.activeElement);
                if (currentFocus === -1) return;

                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    currentFocus = (currentFocus + 1) % tabs.length;
                    tabs[currentFocus].focus();
                    tabs[currentFocus].click();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    currentFocus = (currentFocus - 1 + tabs.length) % tabs.length;
                    tabs[currentFocus].focus();
                    tabs[currentFocus].click();
                }
            });
        }

        // 렌더링 및 스크린 리더 실시간 피드백
        function renderList() {
            const listContainer = document.getElementById('announcement-list');
            listContainer.innerHTML = '';

            const filtered = announcements.filter(item => {
                const matchesCategory = (currentCategory === 'all' || item.category === currentCategory);
                const matchesSearch = (
                    item.title.toLowerCase().includes(searchQuery) ||
                    item.content.toLowerCase().includes(searchQuery) ||
                    item.tags.some(tag => tag.toLowerCase().includes(searchQuery))
                );
                return matchesCategory && matchesSearch;
            });

            // ARIA Live region 업데이트 (스크린 리더 사용자에게 실시간 검색 결과 수 알림)
            const srAnnouncement = document.getElementById('sr-announcement');
            const categoryNames = { all: "전체보기", qa: "QA", monitoring: "모니터링", general: "기타 공지" };
            srAnnouncement.textContent = `현재 ${categoryNames[currentCategory]} 카테고리, 검색 결과 총 ${filtered.length}개의 항목이 로드되었습니다.`;

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-16 bg-slate-800/20 border border-dashed border-slate-800 rounded-2xl" role="status">
                        <span class="text-4xl" aria-hidden="true">🤔</span>
                        <p class="text-slate-300 mt-3 text-sm">일치하는 공지사항이 없습니다.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                // 카테고리 뱃지 마크업 (의미 없는 이모지는 aria-hidden 처리)
                let catBadge = '';
                if(item.category === 'qa') {
                    catBadge = '<span class="bg-rose-500/10 text-rose-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-rose-500/20"><span aria-hidden="true">🐛 </span>QA</span>';
                } else if(item.category === 'monitoring') {
                    catBadge = '<span class="bg-cyan-500/10 text-cyan-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-cyan-500/20"><span aria-hidden="true">📊 </span>모니터링</span>';
                } else {
                    catBadge = '<span class="bg-amber-500/10 text-amber-300 text-xs px-2.5 py-1 rounded-full font-semibold border border-amber-500/20"><span aria-hidden="true">📢 </span>기타 공지</span>';
                }

                // 우선순위 뱃지 마크업 및 의미 명확화
                let priorityBadge = '';
                if (item.priority === 'High') {
                    priorityBadge = `<span class="text-[10px] bg-red-500/20 text-red-200 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide" aria-label="우선순위: 높음">High</span>`;
                } else if (item.priority === 'Medium') {
                    priorityBadge = `<span class="text-[10px] bg-amber-500/20 text-amber-200 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide" aria-label="우선순위: 보통">Medium</span>`;
                } else {
                    priorityBadge = `<span class="text-[10px] bg-slate-700 text-slate-200 px-1.5 py-0.5 rounded font-bold uppercase tracking-wide" aria-label="우선순위: 낮음">Low</span>`;
                }

                const tagBadges = item.tags.map(tag => `<span class="text-xs text-indigo-300 bg-indigo-500/5 border border-indigo-500/10 px-2 py-0.5 rounded-md" aria-label="태그 ${tag}">#${tag}</span>`).join(' ');

                const cardHtml = `
                    <article class="bg-slate-800/40 border border-slate-800/80 rounded-2xl p-6 hover:border-slate-700 hover:bg-slate-800/60 focus-within:ring-2 focus-within:ring-indigo-500 transition-all duration-200" aria-labelledby="post-title-${item.id}">
                        <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                            <div class="flex items-center gap-2">
                                ${catBadge}
                                ${priorityBadge}
                            </div>
                            <time class="text-xs text-slate-300" datetime="${item.date}">${item.date}</time>
                        </div>
                        <h3 id="post-title-${item.id}" class="text-lg font-semibold text-white mb-2">
                            <a href="#" class="hover:text-indigo-400 focus:outline-none focus:underline transition-colors">${item.title}</a>
                        </h3>
                        <p class="text-sm text-slate-300 leading-relaxed mb-4 whitespace-pre-line">${item.content}</p>
                        <div class="flex flex-wrap items-center justify-between gap-3 pt-3 border-t border-slate-800/80">
                            <div class="flex flex-wrap gap-1.5" aria-label="관련 태그">${tagBadges}</div>
                            <span class="text-xs text-slate-300 font-medium">작성자: ${item.author}</span>
                        </div>
                    </article>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }
    </script>
</body>
</html>
